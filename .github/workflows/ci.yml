name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          # full history: test-old-cache-overlap.sh extracts pre-conversion
          # commit 3522710 via git archive, which a shallow clone lacks
          fetch-depth: 0

      - name: Run test suite
        run: bash tests/run-all.sh
        shell: bash
        timeout-minutes: 40
